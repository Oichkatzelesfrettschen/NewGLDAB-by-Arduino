; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = pro_mini

; Common settings for all environments
[env]
framework = arduino
monitor_speed = 9600
lib_ldf_mode = deep+
build_flags = 
    -Wall
    -Wextra
    -D VERSION=1.0.0

; Library dependencies common to all environments
lib_deps = 
    ; Servo library for ESC control
    arduino-libraries/Servo@^1.2.1
    
    ; IMU and sensor libraries for future enhancements
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.14.5
    
    ; Pressure sensor support
    adafruit/Adafruit BMP3XX Library@^2.1.2
    
    ; Humidity/Temperature sensor support  
    adafruit/Adafruit SHT31 Library@^2.2.0
    
    ; Math utilities for quaternions
    frankboesing/Quaternion@^1.0.0
    
    ; Testing framework
    throwtheswitch/Unity@^2.5.2

; Arduino Pro Mini 328P 16MHz 5V
[env:pro_mini]
platform = atmelavr
board = pro16MHzatmega328
upload_protocol = arduino
upload_speed = 57600

; Build with maximum optimizations for size
build_flags = 
    ${env.build_flags}
    -Os
    -D ARDUINO_PRO_MINI
    -D F_CPU=16000000L

; Arduino Nano (alternative compatible board)
[env:nano]
platform = atmelavr
board = nanoatmega328
upload_protocol = arduino
upload_speed = 57600

build_flags = 
    ${env.build_flags}
    -Os
    -D ARDUINO_NANO

; Arduino Uno (for testing/development)
[env:uno]
platform = atmelavr
board = uno
upload_protocol = arduino
upload_speed = 115200

build_flags = 
    ${env.build_flags}
    -O2
    -D ARDUINO_UNO

; Development environment with debugging symbols
[env:debug]
platform = atmelavr
board = pro16MHzatmega328
upload_protocol = arduino
upload_speed = 57600

build_flags = 
    ${env.build_flags}
    -Og
    -g
    -D DEBUG
    -D ENABLE_LOGGING

build_type = debug

; Native environment for unit testing on host machine
[env:native]
platform = native
build_flags = 
    ${env.build_flags}
    -std=c++11
    -D UNIT_TEST
    -D NATIVE_BUILD

lib_deps = 
    throwtheswitch/Unity@^2.5.2

test_framework = unity
test_build_src = yes

; ESP32 version for future advanced features
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

build_flags = 
    ${env.build_flags}
    -D ESP32
    -D ENABLE_WIFI
    -D ENABLE_BLUETOOTH

lib_deps = 
    ${env.lib_deps}
    ; ESP32-specific libraries for advanced features
    
monitor_speed = 115200

; Teensy 3.2 for higher performance
[env:teensy32]
platform = teensy
board = teensy31
framework = arduino

build_flags = 
    ${env.build_flags}
    -D TEENSY32
    -D ENABLE_ADVANCED_MATH

lib_deps = 
    ${env.lib_deps}

monitor_speed = 115200

; Static analysis environment
[env:check]
platform = atmelavr
board = pro16MHzatmega328
check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=all --inline-suppr
    clangtidy: --checks=*

; Documentation generation
[env:docs]
platform = native
extra_scripts = 
    pre:scripts/generate_docs.py
